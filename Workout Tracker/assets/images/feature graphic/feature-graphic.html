<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>IronLog Feature Graphic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #0D0D0D;
    font-family: 'Outfit', sans-serif;
  }

  .banner {
    position: relative;
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #0D0D0D;
  }

  /* Atmospheric background texture */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 75% 50%, rgba(0, 217, 165, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 80% at 20% 60%, rgba(74, 108, 247, 0.06) 0%, transparent 60%);
    z-index: 1;
  }

  /* Diagonal iron texture lines */
  .texture-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.03;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.5) 8px,
      rgba(255,255,255,0.5) 9px
    );
  }

  /* Weight plate illustration — large, positioned right */
  .plate {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    width: 460px;
    height: 460px;
    z-index: 2;
    opacity: 0.12;
  }

  .plate-ring {
    position: absolute;
    border-radius: 50%;
    border: solid rgba(255,255,255,0.9);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .plate-ring.outer {
    width: 420px;
    height: 420px;
    border-width: 38px;
  }

  .plate-ring.mid {
    width: 260px;
    height: 260px;
    border-width: 22px;
  }

  .plate-ring.inner {
    width: 140px;
    height: 140px;
    border-width: 14px;
  }

  .plate-ring.core {
    width: 70px;
    height: 70px;
    border-width: 10px;
  }

  /* Content safe frame */
  .content {
    position: relative;
    z-index: 10;
    padding: 50px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* App name */
  .app-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 112px;
    letter-spacing: 6px;
    line-height: 0.9;
    color: #FFFFFF;
    position: relative;
  }

  .app-name .iron {
    display: inline;
    color: #FFFFFF;
  }

  .app-name .log {
    display: inline;
    color: #00D9A5;
  }

  /* Accent bar */
  .accent-bar {
    width: 80px;
    height: 5px;
    background: linear-gradient(90deg, #00D9A5, #4A6CF7);
    margin: 20px 0 24px;
    border-radius: 3px;
  }

  /* Tagline */
  .tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 32px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }

  .tagline span {
    color: rgba(0, 217, 165, 0.7);
    font-weight: 600;
  }

  /* Subtle bottom edge accent */
  .bottom-edge {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #00D9A5, #4A6CF7, #FF6B5B);
    z-index: 10;
  }

  /* Decorative corner marks */
  .corner-mark {
    position: absolute;
    z-index: 10;
    opacity: 0.15;
  }

  .corner-mark.tl {
    top: 30px;
    left: 30px;
    width: 30px;
    height: 30px;
    border-top: 2px solid #00D9A5;
    border-left: 2px solid #00D9A5;
  }

  .corner-mark.br {
    bottom: 30px;
    right: 30px;
    width: 30px;
    height: 30px;
    border-bottom: 2px solid #4A6CF7;
    border-right: 2px solid #4A6CF7;
  }

  /* Small detail: version or descriptor */
  .descriptor {
    position: absolute;
    top: 50px;
    right: 60px;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(0, 217, 165, 0.35);
    writing-mode: vertical-rl;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="texture-lines"></div>

  <!-- Weight plate background element -->
  <div class="plate">
    <div class="plate-ring outer"></div>
    <div class="plate-ring mid"></div>
    <div class="plate-ring inner"></div>
    <div class="plate-ring core"></div>
  </div>

  <!-- Corner marks -->
  <div class="corner-mark tl"></div>
  <div class="corner-mark br"></div>

  <!-- Side descriptor -->
  <div class="descriptor">Workout Tracker</div>

  <!-- Main content within safe frame -->
  <div class="content">
    <div class="app-name">
      <span class="iron">IRON</span><span class="log">LOG</span>
    </div>
    <div class="accent-bar"></div>
    <div class="tagline">Track <span>·</span> Lift <span>·</span> Progress</div>
  </div>

  <div class="bottom-edge"></div>
</div>
</body>
</html>
